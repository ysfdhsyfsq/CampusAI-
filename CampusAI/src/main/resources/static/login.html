
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusAI+ 智慧校园 - 登录</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 900px;
            min-height: 500px;
            display: flex;
        }

        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px 40px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-left h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .login-left p {
            font-size: 1.1rem;
            opacity: 0.9;
            line-height: 1.8;
        }

        .features {
            margin-top: 40px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin: 15px 0;
            font-size: 1rem;
        }

        .feature-icon {
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.2rem;
        }

        .login-right {
            flex: 1;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .login-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #999;
            font-weight: 500;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .login-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .login-tab:hover {
            color: #667eea;
        }

        .login-form-container {
            display: none;
        }

        .login-form-container.active {
            display: block;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h2 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #999;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .code-input-group {
            display: flex;
            gap: 10px;
        }

        .code-input-group input {
            flex: 1;
        }

        .send-code-btn {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .send-code-btn:hover {
            background: #5568d3;
        }

        .send-code-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: #666;
        }

        .remember-me input {
            margin-right: 8px;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #ff4d4f;
            font-size: 0.9rem;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
                width: 90%;
            }

            .login-left {
                padding: 40px 30px;
            }

            .login-right {
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <h1>🎓 CampusAI+</h1>
            <p>智慧校园生活服务平台</p>
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">🍜</div>
                    <span>校园餐饮服务</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📚</div>
                    <span>自习室在线预约</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🎉</div>
                    <span>校园活动报名</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🤖</div>
                    <span>AI智能助手</span>
                </div>
            </div>
        </div>

        <div class="login-right">
            <div class="login-header">
                <h2>欢迎登录</h2>
                <p>选择登录方式进入系统</p>
            </div>

            <div class="login-tabs">
                <div class="login-tab active" onclick="switchTab('phone')">📱 手机号登录</div>
                <div class="login-tab" onclick="switchTab('username')"> 用户名登录</div>
            </div>

            <!-- 手机号验证码登录 -->
            <div id="phoneLoginForm" class="login-form-container active">
                <form id="phoneForm">
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="tel" id="phone" placeholder="请输入手机号" maxlength="11" required>
                    </div>

                    <div class="form-group">
                        <label>验证码</label>
                        <div class="code-input-group">
                            <input type="text" id="code" placeholder="请输入验证码" maxlength="6" required>
                            <button type="button" class="send-code-btn" id="sendCodeBtn" onclick="sendCode()">获取验证码</button>
                        </div>
                    </div>

                    <button type="submit" class="login-btn">登 录</button>

                    <div class="login-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe"> 记住我
                        </label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>

                    <div class="error-message" id="phoneError"></div>
                </form>
            </div>

            <!-- 用户名密码登录 -->
            <div id="usernameLoginForm" class="login-form-container">
                <form id="usernameForm">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="username" placeholder="请输入用户名" required>
                    </div>

                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="password" placeholder="请输入密码" required>
                    </div>

                    <button type="submit" class="login-btn">登 录</button>

                    <div class="login-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMeUser"> 记住我
                        </label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>

                    <div class="error-message" id="usernameError"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let countdown = 0;
        let countdownTimer = null;

        // 切换登录方式
        function switchTab(type) {
            document.querySelectorAll('.login-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.login-form-container').forEach(form => form.classList.remove('active'));

            if (type === 'phone') {
                document.querySelectorAll('.login-tab')[0].classList.add('active');
                document.getElementById('phoneLoginForm').classList.add('active');
            } else {
                document.querySelectorAll('.login-tab')[1].classList.add('active');
                document.getElementById('usernameLoginForm').classList.add('active');
            }
        }

        async function sendCode() {
            const phone = document.getElementById('phone').value;
            
            if (!phone || phone.length !== 11) {
                showError('phoneError', '请输入正确的手机号');
                return;
            }

            const btn = document.getElementById('sendCodeBtn');
            
            try {
                const response = await axios.get('/sms/sendCode', {
                    params: { phone }
                });
                
                if (response.data.code === 200) {
                    alert(response.data.msg);
                    startCountdown();
                } else {
                    showError('phoneError', response.data.msg || '发送失败');
                }
            } catch (error) {
                showError('phoneError', '发送失败: ' + (error.response?.data?.msg || error.message));
            }
        }

        function startCountdown() {
            countdown = 60;
            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            
            countdownTimer = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}秒后重试`;
                
                if (countdown <= 0) {
                    clearInterval(countdownTimer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            }, 1000);
        }

        function showError(elementId, message) {
            const errorDiv = document.getElementById(elementId);
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        // 手机号验证码登录
        document.getElementById('phoneForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const code = document.getElementById('code').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!phone || !code) {
                showError('phoneError', '请填写完整信息');
                return;
            }

            try {
                const response = await axios.post('/user/codeLogin', 
                    new URLSearchParams({ phone, code }),
                    {
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                    }
                );

                if (response.data.code === 200) {
                    if (rememberMe) {
                        localStorage.setItem('loginType', 'phone');
                        localStorage.setItem('username', phone);
                    }
                    
                    alert('登录成功！');
                    window.location.href = '/home.html';
                } else {
                    showError('phoneError', response.data.msg || '登录失败');
                }
            } catch (error) {
                showError('phoneError', '登录失败: ' + (error.response?.data?.msg || error.message));
            }
        });

        // 用户名密码登录
        document.getElementById('usernameForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMeUser').checked;

            if (!username || !password) {
                showError('usernameError', '请填写完整信息');
                return;
            }

            try {
                const response = await axios.post('/user/login',
                    new URLSearchParams({ username, password }),
                    {
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                    }
                );

                if (response.data.code === 200) {
                    if (rememberMe) {
                        localStorage.setItem('loginType', 'username');
                        localStorage.setItem('username', username);
                    }

                    alert('登录成功！');
                    window.location.href = '/home.html';
                } else {
                    showError('usernameError', response.data.msg || '登录失败');
                }
            } catch (error) {
                showError('usernameError', '登录失败: ' + (error.response?.data?.msg || error.message));
            }
        });

        window.onload = () => {
            const savedUsername = localStorage.getItem('username');
            const loginType = localStorage.getItem('loginType');

            if (savedUsername) {
                document.getElementById('rememberMe').checked = true;
                document.getElementById('rememberMeUser').checked = true;

                if (loginType === 'username') {
                    switchTab('username');
                    document.getElementById('username').value = savedUsername;
                } else {
                    document.getElementById('phone').value = savedUsername;
                }
            }
        };
    </script>
</body>
</html>
