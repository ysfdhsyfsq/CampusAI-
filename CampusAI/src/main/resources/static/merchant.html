<!DOCTYPE html>
<html lang="zh-CN">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家管理 - CampusAI</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.5rem; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .tab-btn.active { background: #667eea; color: white; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 8px; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .btn-sm { padding: 4px 8px; font-size: 0.8rem; }
        .btn-success { background: #52c41a; color: white; }
        .btn-warning { background: #faad14; color: white; }
        .btn-danger { background: #ff4d4f; color: white; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; }
        .status-pending { background: #fff7e6; color: #fa8c16; }
        .status-approved { background: #f6ffed; color: #52c41a; }
        .status-rejected { background: #fff2f0; color: #ff4d4f; }
        .status-active { background: #f6ffed; color: #52c41a; }
        .status-inactive { background: #fff2f0; color: #ff4d4f; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .empty-state-icon { font-size: 3rem; margin-bottom: 10px; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .pagination button { padding: 6px 12px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; }
        .pagination button.active { background: #667eea; color: white; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-bar input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .action-btns { display: flex; gap: 5px; }
        .image-preview { margin-top: 10px; }
        .image-preview img { max-width: 200px; max-height: 200px; border-radius: 8px; }
        .image-preview-text { color: #999; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏪 商家管理中心</h1>
        <div class="user-info">
            <span>欢迎，<strong id="username">加载中...</strong></span>
            <button class="btn btn-warning" onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('apply')">商家入驻申请</button>
            <button class="tab-btn" onclick="switchTab('dishes')">我的菜品管理</button>
        </div>

        <!-- 商家入驻申请表单 -->
        <div id="applyTab" class="tab-content active">
            <h2>商家入驻申请</h2>
            <form id="merchantApplyForm">
                <div class="form-group">
                    <label>商家名称 *</label>
                    <input type="text" id="merchantName" required placeholder="请输入商家名称">
                </div>
                <div class="form-group">
                    <label>联系人 *</label>
                    <input type="text" id="contactPerson" required placeholder="请输入联系人">
                </div>
                <div class="form-group">
                    <label>联系电话 *</label>
                    <input type="tel" id="contactPhone" required placeholder="请输入联系电话">
                </div>
                <div class="form-group">
                    <label>地址 *</label>
                    <input type="text" id="address" required placeholder="请输入商家地址">
                </div>
                <div class="form-group">
                    <label>营业执照号</label>
                    <input type="text" id="businessLicense" placeholder="请输入营业执照号">
                </div>
                <div class="form-group">
                    <label>Logo URL</label>
                    <input type="text" id="logo" placeholder="请输入Logo图片URL">
                    <div class="image-preview" id="logoPreview">
                        <span class="image-preview-text">Logo预览</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>商家描述</label>
                    <textarea id="description" rows="3" placeholder="请输入商家描述"></textarea>
                </div>
                <button type="submit" class="btn btn-success">提交申请</button>
            </form>

            <h3 style="margin-top: 30px;">申请记录</h3>
            <table>
                <thead>
                    <tr>
                        <th>商家名称</th>
                        <th>联系人</th>
                        <th>联系电话</th>
                        <th>申请时间</th>
                        <th>状态</th>
                        <th>拒绝原因</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="merchantTableBody">
                </tbody>
            </table>
        </div>

        <!-- 菜品管理 -->
        <div id="dishesTab" class="tab-content">
            <div class="search-bar">
                <input type="text" id="dishSearchInput" placeholder="搜索菜品名称...">
                <select id="categoryFilter">
                    <option value="">全部分类</option>
                </select>
                <button class="btn btn-success" onclick="searchDishes()">搜索</button>
                <button class="btn btn-warning" onclick="showAddDishModal()">添加菜品</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>图片</th>
                        <th>菜品名称</th>
                        <th>分类</th>
                        <th>价格</th>
                        <th>描述</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="dishTableBody">
                </tbody>
            </table>
            <div class="pagination" id="dishPagination"></div>
        </div>
    </div>

    <!-- 添加/编辑菜品模态框 -->
    <div class="modal" id="dishModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="dishModalTitle">添加菜品</h2>
                <button class="close-btn" onclick="closeDishModal()">&times;</button>
            </div>
            <form id="dishForm">
                <input type="hidden" id="dishId">
                <div class="form-group">
                    <label>菜品名称 *</label>
                    <input type="text" id="dishName" required placeholder="请输入菜品名称">
                </div>
                <div class="form-group">
                    <label>分类 *</label>
                    <select id="dishCategory" required>
                        <option value="">请选择分类</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>价格 *</label>
                    <input type="number" id="dishPrice" step="0.01" required placeholder="请输入价格">
                </div>
                <div class="form-group">
                    <label>图片URL</label>
                    <input type="text" id="dishImage" placeholder="请输入图片URL">
                    <div class="image-preview" id="dishImagePreview">
                        <span class="image-preview-text">图片预览</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="dishDescription" rows="3" placeholder="请输入菜品描述"></textarea>
                </div>
                <button type="submit" class="btn btn-success">保存</button>
            </form>
        </div>
    </div>

    <script>
        axios.defaults.withCredentials = true;
        axios.defaults.baseURL = '';

        let currentPage = 1;
        let pageSize = 10;
        let currentMerchant = null;

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');

            if (tabName === 'dishes') {
                loadCategories();
                loadDishes();
            } else if (tabName === 'apply') {
                loadMerchants();
            }
        }

        async function loadUserInfo() {
            try {
                const response = await axios.get('/user/currentUser');
                console.log('用户信息响应:', response.data);

                if (response.data && (response.data.code === 200 || response.data.username)) {
                    const user = response.data;
                    const usernameEl = document.getElementById('username');
                    if (usernameEl) {
                        usernameEl.textContent = user.username || '未知用户';
                    }
                    currentMerchant = user;
                    console.log('用户加载成功，角色:', user.role);
                } else {
                    console.warn('未获取到有效用户信息，跳转登录页');
                    window.location.href = '/login.html';
                }
            } catch (error) {
                console.error('获取用户信息失败:', error);
                if (error.response && error.response.status === 401) {
                    window.location.href = '/login.html';
                }
            }
        }

        async function loadMerchants() {
            try {
                const response = await axios.get('/merchant/list');
                const merchants = response.data.data;
                const tbody = document.getElementById('merchantTableBody');

                if (!tbody) {
                    console.error('merchantTableBody 元素不存在');
                    return;
                }

                if (merchants && merchants.length > 0) {
                    tbody.innerHTML = merchants.map(merchant => `
                        <tr>
                            <td>${merchant.merchantName}</td>
                            <td>${merchant.contactPerson}</td>
                            <td>${merchant.contactPhone}</td>
                            <td>${new Date(merchant.createTime).toLocaleDateString()}</td>
                            <td>
                                <span class="status-badge ${getStatusClass(merchant.status)}">
                                    ${getStatusText(merchant.status)}
                                </span>
                            </td>
                            <td>${merchant.rejectReason || '-'}</td>
                            <td class="action-btns">
                                ${merchant.status === 0 ? `
                                    <button class="btn btn-sm btn-warning" onclick="editMerchant(${merchant.id})">编辑</button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteMerchant(${merchant.id})">删除</button>
                                ` : '-'}
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><div class="empty-state-icon">📭</div><p>暂无申请记录</p></td></tr>';
                }
            } catch (error) {
                console.error('加载商家列表失败:', error);
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 0: return 'status-pending';
                case 1: return 'status-approved';
                case 2: return 'status-rejected';
                default: return '';
            }
        }

        function getStatusText(status) {
            switch(status) {
                case 0: return '待审核';
                case 1: return '已通过';
                case 2: return '已拒绝';
                default: return '未知';
            }
        }

        async function editMerchant(id) {
            try {
                const response = await axios.get('/merchant/' + id);
                const merchant = response.data.data;

                document.getElementById('merchantName').value = merchant.merchantName;
                document.getElementById('contactPerson').value = merchant.contactPerson;
                document.getElementById('contactPhone').value = merchant.contactPhone;
                document.getElementById('address').value = merchant.address;
                document.getElementById('businessLicense').value = merchant.businessLicense;
                document.getElementById('logo').value = merchant.logo || '';
                document.getElementById('description').value = merchant.description || '';

                if (merchant.logo) {
                    document.getElementById('logoPreview').innerHTML = '<img src="' + merchant.logo + '" alt="Logo">';
                }

                const form = document.getElementById('merchantApplyForm');
                if (form) {
                    form.dataset.merchantId = id;
                }
            } catch (error) {
                console.error('获取商家信息失败:', error);
            }
        }

        async function deleteMerchant(id) {
            if (!confirm('确定要删除该申请吗？')) return;

            try {
                const response = await axios.delete('/merchant/delete/' + id);
                if (response.data.code === 200) {
                    alert(response.data.msg);
                    loadMerchants();
                } else {
                    alert(response.data.msg);
                }
            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败，请稍后重试');
            }
        }

        async function loadCategories() {
            try {
                const response = await axios.get('/category/list');
                const categories = response.data.data;

                const categorySelect = document.getElementById('dishCategory');
                const categoryFilter = document.getElementById('categoryFilter');

                categorySelect.innerHTML = '<option value="">请选择分类</option>';
                categoryFilter.innerHTML = '<option value="">全部分类</option>';

                categories.forEach(category => {
                    categorySelect.innerHTML += '<option value="' + category.id + '">' + category.name + '</option>';
                    categoryFilter.innerHTML += '<option value="' + category.id + '">' + category.name + '</option>';
                });
            } catch (error) {
                console.error('加载分类失败:', error);
            }
        }

        async function loadDishes(page) {
            page = page || 1;
            currentPage = page;
            const searchName = document.getElementById('dishSearchInput').value;
            const categoryId = document.getElementById('categoryFilter').value;

            try {
                let url = '/dish/list?pageNum=' + page + '&pageSize=' + pageSize;
                if (categoryId) url += '&categoryId=' + categoryId;
                if (searchName) url += '&name=' + searchName;

                const response = await axios.get(url);
                const dishes = response.data.data;
                const total = response.data.total;

                const tbody = document.getElementById('dishTableBody');
                if (dishes && dishes.length > 0) {
                    tbody.innerHTML = dishes.map(function(dish) {
                        var imageHtml = dish.image ?
                            '<img src="' + dish.image + '" style="width: 60px; height: 60px; object-fit: cover; border-radius: 8px;" onerror="this.style.display=\'none\'">' :
                            '<span style="color: #999;">无图片</span>';

                        var statusBadge = dish.status === 1 ?
                            '<span class="status-badge status-active">上架中</span>' :
                            '<span class="status-badge status-inactive">已下架</span>';

                        var toggleBtn = dish.status === 1 ?
                            '<button class="btn btn-sm btn-success" onclick="toggleDishStatus(' + dish.id + ', 0)">下架</button>' :
                            '<button class="btn btn-sm btn-success" onclick="toggleDishStatus(' + dish.id + ', 1)">上架</button>';

                        return '<tr>' +
                            '<td>' + dish.id + '</td>' +
                            '<td>' + imageHtml + '</td>' +
                            '<td>' + dish.name + '</td>' +
                            '<td>' + (dish.categoryId || '-') + '</td>' +
                            '<td>¥' + dish.price + '</td>' +
                            '<td>' + (dish.description || '-') + '</td>' +
                            '<td>' + statusBadge + '</td>' +
                            '<td>' + new Date(dish.createTime).toLocaleDateString() + '</td>' +
                            '<td class="action-btns">' +
                                toggleBtn +
                                '<button class="btn btn-sm btn-warning" onclick="editDish(' + dish.id + ')">编辑</button>' +
                                '<button class="btn btn-sm btn-danger" onclick="deleteDish(' + dish.id + ')">删除</button>' +
                            '</td>' +
                        '</tr>';
                    }).join('');

                    renderPagination(total, page);
                } else {
                    tbody.innerHTML = '<tr><td colspan="9" class="empty-state"><div class="empty-state-icon"></div><p>暂无菜品数据</p></td></tr>';
                    document.getElementById('dishPagination').innerHTML = '';
                }
            } catch (error) {
                console.error('加载菜品列表失败:', error);
            }
        }

        function renderPagination(total, current) {
            const totalPages = Math.ceil(total / pageSize);
            const pagination = document.getElementById('dishPagination');

            let html = '<button ' + (current === 1 ? 'disabled' : '') + ' onclick="loadDishes(' + (current - 1) + ')">上一页</button>';

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= current - 2 && i <= current + 2)) {
                    html += '<button class="' + (i === current ? 'active' : '') + '" onclick="loadDishes(' + i + ')">' + i + '</button>';
                } else if (i === current - 3 || i === current + 3) {
                    html += '<button disabled>...</button>';
                }
            }

            html += '<button ' + (current === totalPages ? 'disabled' : '') + ' onclick="loadDishes(' + (current + 1) + ')">下一页</button>';

            pagination.innerHTML = html;
        }

        function searchDishes() {
            loadDishes(1);
        }

        function showAddDishModal() {
            document.getElementById('dishModalTitle').textContent = '添加菜品';
            document.getElementById('dishForm').reset();
            document.getElementById('dishId').value = '';
            document.getElementById('dishImagePreview').innerHTML = '<span class="image-preview-text">图片预览</span>';
            document.getElementById('dishModal').classList.add('show');
        }

        function closeDishModal() {
            document.getElementById('dishModal').classList.remove('show');
        }

        async function editDish(id) {
            try {
                const response = await axios.get('/dish/' + id);
                const dish = response.data.data;

                document.getElementById('dishModalTitle').textContent = '编辑菜品';
                document.getElementById('dishId').value = dish.id;
                document.getElementById('dishName').value = dish.name;
                document.getElementById('dishCategory').value = dish.categoryId;
                document.getElementById('dishPrice').value = dish.price;
                document.getElementById('dishImage').value = dish.image || '';
                document.getElementById('dishDescription').value = dish.description || '';

                if (dish.image) {
                    document.getElementById('dishImagePreview').innerHTML = '<img src="' + dish.image + '" alt="菜品图片">';
                } else {
                    document.getElementById('dishImagePreview').innerHTML = '<span class="image-preview-text">图片预览</span>';
                }

                document.getElementById('dishModal').classList.add('show');
            } catch (error) {
                console.error('获取菜品信息失败:', error);
            }
        }

        async function toggleDishStatus(id, newStatus) {
            const action = newStatus === 1 ? '上架' : '下架';
            if (!confirm('确定要' + action + '该菜品吗？')) return;

            try {
                const response = await axios.post('/dish/status/' + id + '/' + newStatus);

                if (typeof response.data === 'string' && response.data.includes('Please sign in')) {
                    alert('登录已过期或权限不足，请重新登录');
                    window.location.href = '/login.html';
                    return;
                }

                if (response.data.code === 200) {
                    alert(response.data.msg);
                    loadDishes(currentPage);
                } else {
                    alert(response.data.msg);
                }
            } catch (error) {
                console.error('操作失败:', error);
                alert('操作失败：' + (error.response && error.response.data && error.response.data.msg ? error.response.data.msg : error.message));
            }
        }

        async function deleteDish(id) {
            if (!confirm('确定要删除该菜品吗？此操作将下架该菜品。')) return;

            try {
                const response = await axios.delete('/dish/delete/' + id, { withCredentials: true });

                if (typeof response.data === 'string' && response.data.includes('Please sign in')) {
                    alert('登录已过期或权限不足，请重新登录');
                    window.location.href = '/login.html';
                    return;
                }

                if (response.data.code === 200) {
                    alert(response.data.msg);
                    loadDishes(currentPage);
                } else {
                    alert(response.data.msg);
                }
            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败：' + (error.response && error.response.data && error.response.data.msg ? error.response.data.msg : error.message));
            }
        }

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                axios.post('/user/logout').then(function() {
                    window.location.href = '/login.html';
                }).catch(function() {
                    window.location.href = '/login.html';
                });
            }
        }

        window.onload = function() {
            loadUserInfo();
            loadMerchants();

            const merchantApplyForm = document.getElementById('merchantApplyForm');
            if (merchantApplyForm) {
                merchantApplyForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const merchant = {
                        merchantName: document.getElementById('merchantName').value,
                        contactPerson: document.getElementById('contactPerson').value,
                        contactPhone: document.getElementById('contactPhone').value,
                        address: document.getElementById('address').value,
                        businessLicense: document.getElementById('businessLicense').value,
                        logo: document.getElementById('logo').value,
                        description: document.getElementById('description').value,
                        status: 0
                    };

                    axios.post('/merchant/apply', merchant).then(function(response) {
                        if (response.data.code === 200) {
                            alert(response.data.msg);
                            document.getElementById('merchantApplyForm').reset();
                            document.getElementById('logoPreview').innerHTML = '<span class="image-preview-text">Logo预览</span>';
                            loadMerchants();
                        } else {
                            alert(response.data.msg);
                        }
                    }).catch(function(error) {
                        console.error('提交申请失败:', error);
                        alert('提交申请失败，请稍后重试');
                    });
                });
            }

            const logoInput = document.getElementById('logo');
            if (logoInput) {
                logoInput.addEventListener('input', function(e) {
                    const url = e.target.value;
                    const preview = document.getElementById('logoPreview');
                    if (url) {
                        preview.innerHTML = '<img src="' + url + '" alt="Logo">';
                    } else {
                        preview.innerHTML = '<span class="image-preview-text">Logo预览</span>';
                    }
                });
            }

            const dishForm = document.getElementById('dishForm');
            if (dishForm) {
                dishForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const dishId = document.getElementById('dishId').value;
                    const dish = {
                        id: dishId || null,
                        name: document.getElementById('dishName').value,
                        categoryId: document.getElementById('dishCategory').value,
                        price: document.getElementById('dishPrice').value,
                        image: document.getElementById('dishImage').value,
                        description: document.getElementById('dishDescription').value,
                        status: 1
                    };

                    var request = dishId ? axios.post('/dish/update', dish) : axios.post('/dish/add', dish);
                    request.then(function(response) {
                        if (response.data.code === 200) {
                            alert(response.data.msg);
                            closeDishModal();
                            loadDishes(currentPage);
                        } else {
                            alert(response.data.msg);
                        }
                    }).catch(function(error) {
                        console.error('保存菜品失败:', error);
                        alert('保存菜品失败，请稍后重试');
                    });
                });
            }

            const dishImageInput = document.getElementById('dishImage');
            if (dishImageInput) {
                dishImageInput.addEventListener('input', function(e) {
                    const url = e.target.value;
                    const preview = document.getElementById('dishImagePreview');
                    if (url) {
                        preview.innerHTML = '<img src="' + url + '" alt="菜品图片">';
                    } else {
                        preview.innerHTML = '<span class="image-preview-text">图片预览</span>';
                    }
                });
            }
        };
    </script>
</body>
</html>
