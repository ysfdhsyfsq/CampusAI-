# 文件路径：C:\Users\fsq\Desktop\CampusAI+智慧校园生活服务平台\CampusAI\nginx.conf
server {
    listen 80;
    server_name localhost;

    # 静态页面直接访问
    location / {
        root ./static;
        index activity-list.html;
        try_files $uri $uri/ /activity-list.html;
    }

    # API 接口代理到 Spring Boot
    location /api/ {
        proxy_pass http://localhost:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 活动列表
    location = /activity-list.html {
        root ./static;
    }

    # 活动详情
    location ~ ^/activity-\d+\.html$ {
        root ./static;
    }
}
